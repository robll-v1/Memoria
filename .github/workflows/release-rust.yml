name: Release Rust Binaries

# Trigger: push a tag v*.*.* or v*.*.*-* (e.g. v0.1.0, v0.1.0-rc1), or run manually from Actions tab.
on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0-rc1); must already exist'
        required: true
        type: string

jobs:
  test:
    name: Test gate
    if: github.event_name != 'workflow_dispatch'
    uses: ./.github/workflows/test-gate.yml
    secrets: inherit

  build:
    name: Build ${{ matrix.target }}
    needs: [test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: memoria
          shared-key: release-${{ matrix.target }}

      - name: Install build deps (x86_64-linux)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Build (cross)
        if: matrix.cross
        working-directory: memoria
        env:
          SQLX_OFFLINE: "true"
        run: cross build --release -p memoria-cli --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.cross }}
        working-directory: memoria
        env:
          SQLX_OFFLINE: "true"
        run: cargo build --release -p memoria-cli --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp memoria/target/${{ matrix.target }}/release/memoria dist/ 2>/dev/null || true
          cd dist && tar czf ../memoria-${{ matrix.target }}.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: memoria-${{ matrix.target }}
          path: memoria-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -name '*.tar.gz' -exec cp {} . \;
          sha256sum *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS.txt
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
